name: Scrape Election Data

on:
  push:
    branches: [master]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scraper: [ekantipur, ratopati, onlinekhabar]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Run ${{ matrix.scraper }} scraper
        run: uv run python -m scrapers.${{ matrix.scraper }}

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.scraper }}
          path: data/snapshots/${{ matrix.scraper }}/
          retention-days: 7

  merge-and-commit:
    runs-on: ubuntu-latest
    needs: scrape
    if: always() && needs.scrape.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Download all snapshots
        uses: actions/download-artifact@v4
        with:
          pattern: snapshot-*
          path: data/snapshots/
          merge-multiple: false

      - name: Fix snapshot directory structure
        run: |
          for dir in data/snapshots/snapshot-*; do
            scraper="${dir#data/snapshots/snapshot-}"
            mkdir -p "data/snapshots/$scraper"
            mv "$dir"/*.json "data/snapshots/$scraper/" 2>/dev/null || true
            rmdir "$dir" 2>/dev/null || true
          done
          echo "Snapshots:"
          ls -la data/snapshots/*/

      - name: Merge snapshots
        run: uv run python -m scrapers.run_all --merge-only

      - name: Commit all data
        run: |
          git config user.name "election-stats-bot"
          git config user.email "bot@election-stats"
          git add data/
          git diff --cached --quiet || {
            git commit -m "data: snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin master
            git push
          }

  deploy:
    runs-on: ubuntu-latest
    needs: merge-and-commit
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Pull latest data
        run: git pull --rebase origin master

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
