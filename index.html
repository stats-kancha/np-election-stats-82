<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election 2082 - Live Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --fg: #33ff33;
  --fg-dim: #1a991a;
  --amber: #ffb300;
  --red: #ff5c5c;
  --cyan: #2cd9ff;
  --border: #1a3a1a;
  --panel-bg: #0d0d0d;
  --card-bg: #111;
  --card-border: #1a3a1a;
  --font: 'JetBrains Mono', monospace;
}

[data-theme="dracula"] {
  --bg: #282a36;
  --fg: #f8f8f2;
  --fg-dim: #6272a4;
  --amber: #f1fa8c;
  --red: #ff5555;
  --cyan: #8be9fd;
  --border: #44475a;
  --panel-bg: #21222c;
  --card-bg: #2d2f3d;
  --card-border: #44475a;
}

[data-theme="monokai"] {
  --bg: #272822;
  --fg: #f8f8f2;
  --fg-dim: #75715e;
  --amber: #e6db74;
  --red: #f92672;
  --cyan: #66d9ef;
  --border: #3e3d32;
  --panel-bg: #1e1f1c;
  --card-bg: #2d2e28;
  --card-border: #3e3d32;
}

[data-theme="nord"] {
  --bg: #2e3440;
  --fg: #d8dee9;
  --fg-dim: #616e88;
  --amber: #ebcb8b;
  --red: #bf616a;
  --cyan: #88c0d0;
  --border: #3b4252;
  --panel-bg: #272c36;
  --card-bg: #353b48;
  --card-border: #3b4252;
}

[data-theme="solarized-dark"] {
  --bg: #002b36;
  --fg: #839496;
  --fg-dim: #586e75;
  --amber: #b58900;
  --red: #dc322f;
  --cyan: #2aa198;
  --border: #073642;
  --panel-bg: #00242d;
  --card-bg: #073642;
  --card-border: #0a4a5a;
}

[data-theme="paper"] {
  --bg: #f5f5f0;
  --fg: #0f2d0f;
  --fg-dim: #4a6b4a;
  --amber: #b37a00;
  --red: #cc3333;
  --cyan: #0077aa;
  --border: #c5d5c5;
  --panel-bg: #eeeee8;
  --card-bg: #fafaf5;
  --card-border: #c5d5c5;
}

[data-theme="solarized-light"] {
  --bg: #fdf6e3;
  --fg: #657b83;
  --fg-dim: #93a1a1;
  --amber: #b58900;
  --red: #dc322f;
  --cyan: #2aa198;
  --border: #eee8d5;
  --panel-bg: #f5efdc;
  --card-bg: #fdf6e3;
  --card-border: #eee8d5;
}

[data-theme="github"] {
  --bg: #ffffff;
  --fg: #1f2328;
  --fg-dim: #656d76;
  --amber: #bf8700;
  --red: #cf222e;
  --cyan: #0969da;
  --border: #d0d7de;
  --panel-bg: #f6f8fa;
  --card-bg: #ffffff;
  --card-border: #d0d7de;
}

[data-theme="latte"] {
  --bg: #eff1f5;
  --fg: #4c4f69;
  --fg-dim: #8c8fa1;
  --amber: #df8e1d;
  --red: #d20f39;
  --cyan: #179299;
  --border: #ccd0da;
  --panel-bg: #e6e9ef;
  --card-bg: #eff1f5;
  --card-border: #ccd0da;
}

[data-theme="one-light"] {
  --bg: #fafafa;
  --fg: #383a42;
  --fg-dim: #a0a1a7;
  --amber: #c18401;
  --red: #e45649;
  --cyan: #0184bc;
  --border: #d3d3d3;
  --panel-bg: #f0f0f0;
  --card-bg: #fafafa;
  --card-border: #d3d3d3;
}

html { font-size: 14px; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  line-height: 1.5;
  min-height: 100vh;
  position: relative;
}

/* CRT scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.15) 2px,
    rgba(0, 0, 0, 0.15) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

html:not([data-theme="terminal"]) body::after { display: none; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem;
}

/* ── HEADER ── */
.header {
  border: 1px solid var(--border);
  padding: 0.75rem 1rem;
  margin-bottom: 1rem;
  background: var(--panel-bg);
}

.header .prompt {
  color: var(--fg);
  font-weight: 700;
}

.header .prompt .user { color: var(--cyan); }
.header .prompt .host { color: var(--amber); }
.header .prompt .cmd { color: var(--fg-dim); }

.cursor {
  display: inline-block;
  width: 0.6em;
  height: 1.1em;
  background: var(--fg);
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.header-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-top: 0.25rem;
  font-size: 0.85rem;
  color: var(--fg-dim);
}

.header-meta .source-dot {
  display: inline-block;
  width: 0.5em;
  height: 0.5em;
  border-radius: 50%;
  background: var(--fg);
  margin-right: 0.3em;
  vertical-align: middle;
}

/* ── TIMELINE ── */
.timeline-panel {
  border: 1px solid var(--border);
  padding: 0.75rem 1rem;
  margin-bottom: 1rem;
  background: var(--panel-bg);
}

.timeline-panel label {
  font-size: 0.85rem;
  color: var(--fg-dim);
}

.timeline-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-top: 0.25rem;
}

.timeline-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  outline: none;
}

.timeline-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--fg);
  cursor: pointer;
}

.timeline-row input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--fg);
  border: none;
  cursor: pointer;
}

.btn-live {
  background: none;
  border: 1px solid var(--fg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 0.8rem;
  padding: 0.2rem 0.6rem;
  cursor: pointer;
}

.btn-live.active {
  background: var(--fg);
  color: var(--bg);
  font-weight: 700;
}

.timeline-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: var(--fg-dim);
  margin-top: 0.15rem;
  padding: 0 0.5rem;
}

/* ── PARTY STANDINGS ── */
.party-panel {
  border: 1px solid var(--border);
  padding: 0.75rem 1rem;
  margin-bottom: 1rem;
  background: var(--panel-bg);
}

.party-panel h2 {
  font-size: 0.85rem;
  color: var(--fg-dim);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.party-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.35rem;
  font-size: 0.85rem;
}

.party-name {
  min-width: 110px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.party-bar-wrap {
  flex: 1;
  height: 16px;
  background: var(--border);
  position: relative;
}

.party-bar {
  height: 100%;
  transition: width 0.5s ease;
}

.party-seats {
  min-width: 70px;
  text-align: right;
  font-weight: 700;
}

.party-badge {
  font-size: 0.7rem;
  padding: 0 0.3em;
  border-radius: 2px;
}

.badge-winner { background: var(--fg); color: var(--bg); }
.badge-leading { background: var(--amber); color: var(--bg); }

/* ── PROVINCE TABS ── */
.province-tabs {
  border: 1px solid var(--border);
  padding: 0.5rem 1rem;
  margin-bottom: 1rem;
  background: var(--panel-bg);
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.province-tab {
  background: none;
  border: 1px solid var(--border);
  color: var(--fg-dim);
  font-family: var(--font);
  font-size: 0.8rem;
  padding: 0.2rem 0.6rem;
  cursor: pointer;
}

.province-tab.active {
  border-color: var(--fg);
  color: var(--fg);
  font-weight: 700;
}

/* ── CONSTITUENCY GRID ── */
.constituency-section {
  border: 1px solid var(--border);
  padding: 0.75rem 1rem;
  margin-bottom: 1rem;
  background: var(--panel-bg);
}

.constituency-section h2 {
  font-size: 0.85rem;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}

.constituency-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.75rem;
}

.card {
  border: 1px solid var(--card-border);
  padding: 0.6rem;
  background: var(--card-bg);
  font-size: 0.8rem;
}

.card-slug {
  font-weight: 700;
  margin-bottom: 0.3rem;
  color: var(--cyan);
  text-transform: uppercase;
  font-size: 0.75rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.btn-bookmark {
  background: none;
  border: none;
  color: var(--fg-dim);
  font-size: 1rem;
  cursor: pointer;
  padding: 0 0.2rem;
  line-height: 1;
}

.btn-bookmark { opacity: 0.3; }
.btn-bookmark:hover { opacity: 0.7; }
.btn-bookmark.bookmarked { opacity: 1; }

.card-district {
  font-weight: 400;
  color: var(--fg-dim);
  font-size: 0.7rem;
}

.candidate-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 0.2rem;
  padding: 0.15rem 0;
}

.candidate-row.leading { color: var(--amber); }
.candidate-row.winner { color: var(--fg); }

.cand-marker {
  width: 0.7em;
  flex-shrink: 0;
}

.cand-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cand-party {
  font-size: 0.7rem;
  color: var(--fg-dim);
  max-width: 60px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cand-votes {
  min-width: 50px;
  text-align: right;
  font-weight: 700;
}

.card-status {
  margin-top: 0.3rem;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.status-won { color: var(--fg); font-weight: 700; }
.status-leading { color: var(--amber); }
.status-counting {
  color: var(--fg-dim);
  animation: blink 1.5s step-end infinite;
}

.card { cursor: pointer; }
.card:hover { border-color: var(--fg-dim); }
.card.expanded { border-color: var(--cyan); grid-column: 1 / -1; }
.card.expanded .card-candidates-all { display: block; }
.card-candidates-all { display: none; margin-top: 0.3rem; border-top: 1px solid var(--border); padding-top: 0.3rem; }
.card-margin { font-size: 0.7rem; color: var(--fg-dim); margin-top: 0.2rem; }

.candidate-row.won-highlight { font-weight: 700; font-size: 0.85rem; }
.cand-flag { width: 16px; height: 16px; object-fit: contain; flex-shrink: 0; vertical-align: middle; }

/* ── STATUS FILTER ── */
.status-filters {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.5rem;
}

.status-filter-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--fg-dim);
  font-family: var(--font);
  font-size: 0.75rem;
  padding: 0.15rem 0.5rem;
  cursor: pointer;
}

.status-filter-btn.active {
  border-color: var(--fg);
  color: var(--fg);
  font-weight: 700;
}

/* ── PAGINATION ── */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1rem;
  margin-top: 0.75rem;
  font-size: 0.85rem;
}

.pagination button {
  background: none;
  border: 1px solid var(--border);
  color: var(--fg-dim);
  font-family: var(--font);
  font-size: 0.8rem;
  padding: 0.2rem 0.6rem;
  cursor: pointer;
}

.pagination button:not(:disabled):hover {
  border-color: var(--fg);
  color: var(--fg);
}

.pagination button:disabled {
  opacity: 0.3;
  cursor: default;
}

/* ── SEARCH ── */
.search-box {
  margin-bottom: 0.5rem;
}

.search-box input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--fg);
  font-family: var(--font);
  font-size: 0.8rem;
  padding: 0.3rem 0.5rem;
  width: 100%;
  max-width: 300px;
  outline: none;
}

.search-box input:focus {
  border-color: var(--fg);
}

.search-box input::placeholder {
  color: var(--fg-dim);
}

/* ── FOOTER ── */
.footer {
  border: 1px solid var(--border);
  padding: 0.5rem 1rem;
  background: var(--panel-bg);
  font-size: 0.75rem;
  color: var(--fg-dim);
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 0.5rem;
}

.footer a {
  color: var(--fg-dim);
  text-decoration: none;
}

.footer a:hover { color: var(--fg); }

/* ── LOADING ── */
.loading {
  text-align: center;
  padding: 3rem;
  color: var(--fg-dim);
}

.loading::after {
  content: '';
  display: inline-block;
  animation: dots 1.5s steps(3) infinite;
}

@keyframes dots {
  0%   { content: '.'; }
  33%  { content: '..'; }
  66%  { content: '...'; }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  html { font-size: 12px; }
  .party-name { min-width: 80px; }
  .constituency-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="prompt">
      <span class="user">stats-kancha</span>@<span class="host">np-election-82</span>:~$ <span class="cmd">watch --interval=180 results</span> <span class="cursor"></span>
    </div>
    <div class="header-meta">
      <span id="last-scraped">loading...</span>
      <span id="source-status"></span>
      <select id="theme-select" style="background:var(--bg);border:1px solid var(--fg);color:var(--fg);font-family:var(--font);font-size:0.8rem;padding:0.2rem 0.4rem;cursor:pointer;outline:none;">
        <optgroup label="Dark">
          <option value="terminal">Terminal</option>
          <option value="dracula">Dracula</option>
          <option value="monokai">Monokai</option>
          <option value="nord">Nord</option>
          <option value="solarized-dark">Solarized Dark</option>
        </optgroup>
        <optgroup label="Light">
          <option value="paper">Paper</option>
          <option value="solarized-light">Solarized Light</option>
          <option value="github">GitHub</option>
          <option value="latte">Latte</option>
          <option value="one-light">One Light</option>
        </optgroup>
      </select>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="timeline-panel">
    <label>TIMELINE</label>
    <div class="timeline-row">
      <input type="range" id="timeline-slider" min="0" max="0" value="0" step="1">
      <button class="btn-live active" id="btn-live">LIVE</button>
    </div>
    <div class="timeline-labels" id="timeline-labels"></div>
  </div>

  <!-- PARTY STANDINGS -->
  <div class="party-panel">
    <h2>Party Standings</h2>
    <div id="party-bars"></div>
  </div>

  <!-- PROVINCE TABS -->
  <div class="province-tabs" id="province-tabs"></div>

  <!-- CONSTITUENCY RESULTS -->
  <div class="constituency-section">
    <h2>Constituency Results</h2>
    <div class="status-filters" id="status-filters">
      <button class="status-filter-btn active" data-status="ALL">[ALL]</button>
      <button class="status-filter-btn" data-status="WON">[WON]</button>
      <button class="status-filter-btn" data-status="LEADING">[LEADING]</button>
      <button class="status-filter-btn" data-status="COUNTING">[COUNTING]</button>
    </div>
    <div class="status-filters" id="source-filters">
      <span style="font-size:0.75rem;color:var(--fg-dim);margin-right:0.3rem;">SRC:</span>
      <button class="status-filter-btn active" data-source="ALL">[ALL]</button>
      <button class="status-filter-btn" data-source="ekantipur">[ekantipur]</button>
      <button class="status-filter-btn" data-source="ratopati">[ratopati]</button>
      <button class="status-filter-btn" data-source="onlinekhabar">[onlinekhabar]</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="grep constituency...">
    </div>
    <div class="constituency-grid" id="constituency-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span id="footer-sources"></span>
    <span id="footer-refresh">auto-refresh: 60s</span>
    <!-- TODO: update this URL to the actual repo once published -->
    <a href="https://github.com/stats-kancha/np-election-stats-82" target="_blank">github.com/stats-kancha/np-election-stats-82</a> | leave a &#9733; on github
  </div>

</div>

<script>
(function() {
  'use strict';

  // ── THEME ──
  const THEME_KEY = 'election82_theme';
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    const sel = document.getElementById('theme-select');
    if (sel) sel.value = theme;
    localStorage.setItem(THEME_KEY, theme);
  }
  // Migrate old values
  let savedTheme = localStorage.getItem(THEME_KEY) || 'terminal';
  if (savedTheme === 'dark') savedTheme = 'terminal';
  if (savedTheme === 'light') savedTheme = 'paper';
  applyTheme(savedTheme);

  // ── STATE ──
  const BOOKMARKS_KEY = 'election82_bookmarks';
  const DEFAULT_BOOKMARKS = ['jhapa-5'];

  function loadBookmarks() {
    try {
      const saved = JSON.parse(localStorage.getItem(BOOKMARKS_KEY));
      if (saved) return new Set(saved);
    } catch {}
    return new Set(DEFAULT_BOOKMARKS);
  }

  function saveBookmarks() {
    localStorage.setItem(BOOKMARKS_KEY, JSON.stringify([...state.bookmarks]));
  }

  const state = {
    manifest: null,
    mergedData: null,
    snapshotTimestamps: [],
    isLive: true,
    currentProvince: 'ALL',
    currentPage: 1,
    pageSize: 18,
    searchQuery: '',
    refreshTimer: null,
    refreshInterval: 60,
    refreshCountdown: 60,
    bookmarks: loadBookmarks(),
    statusFilter: 'ALL',
    sourceFilter: 'ALL',
    expandedSlug: null,
  };

  // ── DOM REFS ──
  const $ = (sel) => document.querySelector(sel);
  const slider = $('#timeline-slider');
  const btnLive = $('#btn-live');
  const partyBars = $('#party-bars');
  const provinceTabs = $('#province-tabs');
  const grid = $('#constituency-grid');
  const paginationEl = $('#pagination');
  const searchInput = $('#search-input');

  // ── DATA LOADING ──
  async function fetchJSON(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`Failed to fetch ${url}: ${resp.status}`);
    return resp.json();
  }

  async function loadManifest() {
    state.manifest = await fetchJSON('data/manifest.json');
    buildTimestamps();
  }

  function buildTimestamps() {
    // Collect unique timestamps across all sources
    const tsSet = new Set();
    for (const files of Object.values(state.manifest.snapshots)) {
      for (const f of files) {
        // filename: 2026-03-06T12-07-16.json -> timestamp
        tsSet.add(f.replace('.json', ''));
      }
    }
    state.snapshotTimestamps = Array.from(tsSet).sort();

    // Setup slider
    const max = Math.max(0, state.snapshotTimestamps.length - 1);
    slider.max = max;
    slider.value = max;
    renderTimelineLabels();
  }

  function renderTimelineLabels() {
    const labels = $('#timeline-labels');
    const ts = state.snapshotTimestamps;
    if (ts.length === 0) {
      labels.textContent = 'no snapshots';
      return;
    }
    // Show first, middle, last
    const indices = [0];
    if (ts.length > 2) indices.push(Math.floor(ts.length / 2));
    if (ts.length > 1) indices.push(ts.length - 1);

    labels.innerHTML = '';
    for (const i of indices) {
      const span = document.createElement('span');
      span.textContent = formatTimestamp(ts[i]);
      labels.appendChild(span);
    }
  }

  function formatTimestamp(ts) {
    // 2026-03-06T12-07-16 -> 12:07
    const match = ts.match(/T(\d{2})-(\d{2})/);
    return match ? `${match[1]}:${match[2]}` : ts;
  }

  function formatFullTimestamp(ts) {
    // 2026-03-06T12-07-16 -> 2026-03-06 12:07:16
    return ts.replace(/T/, ' ').replace(/-(\d{2})-(\d{2})$/, ':$1:$2');
  }

  async function loadMergedData() {
    state.mergedData = await fetchJSON('data/merged/latest.json');
    render();
  }

  async function loadSnapshotAt(index) {
    // For historical view, load the closest snapshot files and merge client-side
    const ts = state.snapshotTimestamps[index];
    if (!ts) return;

    const snapshots = {};
    for (const [source, files] of Object.entries(state.manifest.snapshots)) {
      // Find the file closest to (<=) the selected timestamp
      const candidates = files.filter(f => f.replace('.json', '') <= ts);
      if (candidates.length > 0) {
        const file = candidates[candidates.length - 1];
        try {
          snapshots[source] = await fetchJSON(`data/snapshots/${source}/${file}`);
        } catch (e) {
          console.warn(`Failed to load ${source}/${file}:`, e);
        }
      }
    }

    // Simple client-side merge
    state.mergedData = clientMerge(snapshots);
    render();
  }

  function clientMerge(snapshots) {
    const merged = {};
    let partySummary = [];

    for (const [source, snapshot] of Object.entries(snapshots)) {
      if (snapshot.parties) partySummary = snapshot.parties;
      for (const record of (snapshot.constituencies || [])) {
        const slug = record.constituency;
        if (!merged[slug]) {
          merged[slug] = record;
        }
      }
    }

    // Group by province
    const byProvince = {};
    for (const record of Object.values(merged)) {
      const pid = record.province.id;
      const pname = record.province.name;
      const key = `${pid}-${pname}`;
      if (!byProvince[key]) {
        byProvince[key] = { province_id: pid, province_name: pname, constituencies: [] };
      }
      byProvince[key].constituencies.push(record);
    }

    for (const prov of Object.values(byProvince)) {
      prov.constituencies.sort((a, b) => a.constituency.localeCompare(b.constituency));
    }

    const provinces = Object.values(byProvince).sort((a, b) => a.province_id - b.province_id);

    return {
      scraped_at: state.snapshotTimestamps[parseInt(slider.value)] || '',
      sources: Object.keys(snapshots),
      total_constituencies: Object.keys(merged).length,
      party_summary: partySummary,
      provinces: provinces,
    };
  }

  // ── RENDER ──
  function render() {
    if (!state.mergedData) return;
    renderHeader();
    renderPartyStandings();
    renderProvinceTabs();
    renderConstituencies();
  }

  function renderHeader() {
    const d = state.mergedData;
    const ts = d.scraped_at || '';
    const display = ts.includes('T') ? ts.substring(0, 19).replace('T', ' ') : ts;
    $('#last-scraped').textContent = `Last scraped: ${display}`;

    const sources = d.sources || [];
    const statusEl = $('#source-status');
    statusEl.innerHTML = sources.map(s =>
      `<span class="source-dot"></span>${s}`
    ).join('  ');

    $('#footer-sources').textContent = `sources: ${sources.map(s => s + ' \u2713').join('  ')}`;
  }

  function renderPartyStandings() {
    const parties = (state.mergedData.party_summary || [])
      .filter(p => p.total_seat > 0)
      .sort((a, b) => b.total_seat - a.total_seat);

    if (parties.length === 0) {
      partyBars.innerHTML = '<div style="color:var(--fg-dim)">No party data available</div>';
      return;
    }

    const maxSeats = parties[0].total_seat || 1;

    partyBars.innerHTML = parties.map(p => {
      const pct = (p.total_seat / maxSeats) * 100;
      const color = p.party_color || 'var(--fg)';
      const badges = [];
      if (p.winner_count > 0) badges.push(`<span class="party-badge badge-winner">${p.winner_count}W</span>`);
      if (p.leading_count > 0) badges.push(`<span class="party-badge badge-leading">${p.leading_count}L</span>`);

      return `<div class="party-row">
        <span class="party-name" title="${p.party_name}">${p.party_name}</span>
        <div class="party-bar-wrap">
          <div class="party-bar" style="width:${pct}%;background:${color}"></div>
        </div>
        <span class="party-seats">${p.total_seat} seats</span>
        <span>${badges.join(' ')}</span>
      </div>`;
    }).join('');
  }

  function renderProvinceTabs() {
    const provinces = state.mergedData.provinces || [];
    const bmCount = state.bookmarks.size;
    let html = `<button class="province-tab ${state.currentProvince === 'BOOKMARKS' ? 'active' : ''}" data-province="BOOKMARKS">[&#128278; ${bmCount}]</button>`;
    html += `<button class="province-tab ${state.currentProvince === 'ALL' ? 'active' : ''}" data-province="ALL">[ALL]</button>`;
    for (const prov of provinces) {
      const active = state.currentProvince === String(prov.province_id) ? 'active' : '';
      html += `<button class="province-tab ${active}" data-province="${prov.province_id}">[${prov.province_id} ${prov.province_name}]</button>`;
    }
    provinceTabs.innerHTML = html;
  }

  function getFilteredConstituencies() {
    const provinces = state.mergedData.provinces || [];
    let all = [];
    for (const prov of provinces) {
      if (state.currentProvince !== 'ALL' && state.currentProvince !== 'BOOKMARKS' && String(prov.province_id) !== state.currentProvince) continue;
      all = all.concat(prov.constituencies);
    }
    if (state.currentProvince === 'BOOKMARKS') {
      all = all.filter(c => state.bookmarks.has(c.constituency));
    }
    if (state.sourceFilter !== 'ALL') {
      all = all.filter(c => c.source === state.sourceFilter);
    }
    if (state.statusFilter !== 'ALL') {
      all = all.filter(c => getCardStatus(c) === state.statusFilter);
    }
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      all = all.filter(c =>
        c.constituency.toLowerCase().includes(q) ||
        c.district.toLowerCase().includes(q) ||
        (c.candidates || []).some(cand => cand.name.toLowerCase().includes(q) || (cand.party || '').toLowerCase().includes(q))
      );
    }
    return all;
  }

  function renderConstituencies() {
    const filtered = getFilteredConstituencies();
    const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    if (state.currentPage > totalPages) state.currentPage = totalPages;

    const start = (state.currentPage - 1) * state.pageSize;
    const page = filtered.slice(start, start + state.pageSize);

    grid.innerHTML = page.map(c => renderCard(c)).join('');
    renderPagination(filtered.length, totalPages);
  }

  function getCardStatus(c) {
    const candidates = c.candidates || [];
    const hasLeading = candidates.some(cand => cand.is_leading);
    const anyVotes = candidates.some(cand => cand.votes > 0);
    // Only trust is_winner from ekantipur (ratopati marks all leaders as winners)
    if (c.source === 'ekantipur') {
      const hasWinner = candidates.some(cand => cand.is_winner);
      if (hasWinner) return 'WON';
    }
    if (hasLeading && anyVotes) return 'LEADING';
    return 'COUNTING';
  }

  function getPartyColor(partyName) {
    const parties = (state.mergedData && state.mergedData.party_summary) || [];
    const nameMap = {
      'Rastriya Swatantra Party': 'rastriya-swatantra-party-rsp',
      'Nepali Congress': 'nepali-congress',
      'CPN-UML': 'cpn-uml',
      'CPN (Maoist Centre)': 'nepali-communist-party',
      'Rastriya Prajatantra Party': 'rastriya-prajatantra-party',
    };
    const slug = nameMap[partyName];
    if (slug) {
      const p = parties.find(p => p.party_slug === slug);
      if (p && p.party_color) return p.party_color;
    }
    const p = parties.find(p => p.party_name === partyName);
    if (p && p.party_color) return p.party_color;
    return null;
  }

  function renderCandidateRow(cand, anyVotes, isTrustedSource) {
    const isRealWinner = cand.is_winner && isTrustedSource;
    let cls = '';
    if (isRealWinner) cls = 'winner won-highlight';
    else if (cand.is_leading && anyVotes) cls = 'leading';

    const marker = isRealWinner ? '\u25b6' : (cand.is_leading && anyVotes ? '\u25b7' : ' ');
    const partyShort = abbreviateParty(cand.party);
    const partyColor = getPartyColor(cand.party);
    const colorStyle = (isRealWinner || (cand.is_leading && anyVotes)) && partyColor ? `style="color:${partyColor}"` : '';
    const flagImg = cand.party_flag ? `<img class="cand-flag" src="${cand.party_flag}" alt="">` : '';

    return `<div class="candidate-row ${cls}" ${colorStyle}>
      <span class="cand-marker">${marker}</span>
      ${isRealWinner || (cand.is_leading && anyVotes) ? flagImg : ''}
      <span class="cand-name" title="${cand.name}">${cand.name}${highlightCandidate(cand)}</span>
      <span class="cand-party" title="${cand.party || ''}">${partyShort}</span>
      <span class="cand-votes">${formatNumber(cand.votes)}</span>
    </div>`;
  }

  function renderCard(c) {
    const allCandidates = [...(c.candidates || [])];
    const isTrustedSource = c.source === 'ekantipur';
    // Sort: winners first (only from trusted source), then leading, then by votes desc
    allCandidates.sort((a, b) => {
      if (isTrustedSource && a.is_winner !== b.is_winner) return a.is_winner ? -1 : 1;
      if (a.is_leading !== b.is_leading) return a.is_leading ? -1 : 1;
      return b.votes - a.votes;
    });
    const anyVotes = allCandidates.some(cand => cand.votes > 0);
    const isExpanded = state.expandedSlug === c.constituency;
    const topCandidates = allCandidates.slice(0, 4);
    const restCandidates = allCandidates.slice(4);

    const status = getCardStatus(c);
    const statusClassMap = { WON: 'status-won', LEADING: 'status-leading', COUNTING: 'status-counting' };
    const statusClass = statusClassMap[status];

    const candHTML = topCandidates.map(cand => renderCandidateRow(cand, anyVotes, isTrustedSource)).join('');

    let expandedHTML = '';
    if (restCandidates.length > 0) {
      expandedHTML = `<div class="card-candidates-all">${restCandidates.map(cand => renderCandidateRow(cand, anyVotes, isTrustedSource)).join('')}</div>`;
    }

    let marginHTML = '';
    if (isExpanded && allCandidates.length >= 2) {
      const sorted = [...allCandidates].sort((a, b) => b.votes - a.votes);
      const margin = sorted[0].votes - sorted[1].votes;
      marginHTML = `<div class="card-margin">margin: ${formatNumber(margin)} votes | ${allCandidates.length} candidates | source: ${c.source || '?'}</div>`;
    }

    const isBookmarked = state.bookmarks.has(c.constituency);
    const bmClass = isBookmarked ? 'bookmarked' : '';
    const bmIcon = '\uD83D\uDD16';
    const expandedClass = isExpanded ? 'expanded' : '';

    return `<div class="card ${expandedClass}" data-card-slug="${c.constituency}">
      <div class="card-slug">
        <span>${c.constituency}</span>
        <span>
          <button class="btn-bookmark ${bmClass}" data-slug="${c.constituency}" title="bookmark">${bmIcon}</button>
          <span class="card-district">${c.district}</span>
        </span>
      </div>
      ${candHTML}
      ${expandedHTML}
      ${marginHTML}
      <div class="card-status ${statusClass}">[${status}]${status === 'WON' ? ' ' + winnerSummary(allCandidates, isTrustedSource) : ''}</div>
    </div>`;
  }

  function winnerSummary(candidates, isTrustedSource) {
    if (!isTrustedSource) return '';
    const w = candidates.find(c => c.is_winner);
    if (!w) return '';
    return `<span style="color:var(--fg);font-weight:400">${w.name} (${w.party || ''})</span>`;
  }

  function highlightCandidate(cand) {
    if (cand.name === 'Balendra Shah') return ' \uD83D\uDD25';
    return '';
  }

  function abbreviateParty(party) {
    if (!party) return '';
    const abbrevs = {
      'Rastriya Swatantra Party': 'RSP',
      'Nepali Congress': 'NC',
      'CPN-UML': 'UML',
      'CPN (Maoist Centre)': 'MC',
      'Rastriya Prajatantra Party': 'RPP',
    };
    return abbrevs[party] || (party.length > 8 ? party.substring(0, 7) + '\u2026' : party);
  }

  function formatNumber(n) {
    if (n === 0 || n == null) return '-';
    return n.toLocaleString('en-NP');
  }

  function renderPagination(total, totalPages) {
    if (totalPages <= 1) {
      paginationEl.innerHTML = `<span>${total} constituencies</span>`;
      return;
    }
    paginationEl.innerHTML = `
      <button id="page-prev" ${state.currentPage <= 1 ? 'disabled' : ''}>\u2190 prev</button>
      <span>page ${state.currentPage}/${totalPages} (${total} total)</span>
      <button id="page-next" ${state.currentPage >= totalPages ? 'disabled' : ''}>next \u2192</button>
    `;
  }

  // ── AUTO-REFRESH ──
  function startAutoRefresh() {
    stopAutoRefresh();
    state.refreshCountdown = state.refreshInterval;
    updateRefreshDisplay();
    state.refreshTimer = setInterval(() => {
      state.refreshCountdown--;
      if (state.refreshCountdown <= 0) {
        state.refreshCountdown = state.refreshInterval;
        if (state.isLive) {
          loadManifest().then(() => loadMergedData()).catch(console.error);
        }
      }
      updateRefreshDisplay();
    }, 1000);
  }

  function stopAutoRefresh() {
    if (state.refreshTimer) {
      clearInterval(state.refreshTimer);
      state.refreshTimer = null;
    }
  }

  function updateRefreshDisplay() {
    const el = $('#footer-refresh');
    if (state.isLive) {
      el.textContent = `auto-refresh: ${state.refreshCountdown}s`;
    } else {
      el.textContent = 'auto-refresh: paused (historical view)';
    }
  }

  // ── EVENT HANDLERS ──
  slider.addEventListener('input', () => {
    const idx = parseInt(slider.value);
    const maxIdx = state.snapshotTimestamps.length - 1;
    if (idx >= maxIdx) {
      setLiveMode(true);
    } else {
      setLiveMode(false);
      loadSnapshotAt(idx);
    }
  });

  btnLive.addEventListener('click', () => {
    setLiveMode(true);
    slider.value = slider.max;
    loadMergedData();
  });

  $('#theme-select').addEventListener('change', (e) => {
    applyTheme(e.target.value);
  });

  function setLiveMode(live) {
    state.isLive = live;
    btnLive.classList.toggle('active', live);
    if (live) {
      startAutoRefresh();
    } else {
      stopAutoRefresh();
      updateRefreshDisplay();
    }
  }

  provinceTabs.addEventListener('click', (e) => {
    const tab = e.target.closest('.province-tab');
    if (!tab) return;
    state.currentProvince = tab.dataset.province;
    state.currentPage = 1;
    renderProvinceTabs();
    renderConstituencies();
  });

  paginationEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    if (btn.id === 'page-prev' && state.currentPage > 1) {
      state.currentPage--;
      renderConstituencies();
    } else if (btn.id === 'page-next') {
      state.currentPage++;
      renderConstituencies();
    }
  });

  grid.addEventListener('click', (e) => {
    // Bookmark toggle
    const btn = e.target.closest('.btn-bookmark');
    if (btn) {
      const slug = btn.dataset.slug;
      if (state.bookmarks.has(slug)) {
        state.bookmarks.delete(slug);
      } else {
        state.bookmarks.add(slug);
      }
      saveBookmarks();
      renderProvinceTabs();
      renderConstituencies();
      return;
    }
    // Card expand/collapse
    const card = e.target.closest('.card');
    if (!card) return;
    const slug = card.dataset.cardSlug;
    state.expandedSlug = (state.expandedSlug === slug) ? null : slug;
    renderConstituencies();
  });

  $('#status-filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.status-filter-btn');
    if (!btn) return;
    state.statusFilter = btn.dataset.status;
    state.currentPage = 1;
    document.querySelectorAll('.status-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.status === state.statusFilter));
    renderConstituencies();
  });

  $('#source-filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.status-filter-btn');
    if (!btn) return;
    state.sourceFilter = btn.dataset.source;
    state.currentPage = 1;
    document.querySelectorAll('#source-filters .status-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.source === state.sourceFilter));
    renderConstituencies();
  });

  searchInput.addEventListener('input', (e) => {
    state.searchQuery = e.target.value.trim();
    state.currentPage = 1;
    renderConstituencies();
  });

  // ── INIT ──
  async function init() {
    grid.innerHTML = '<div class="loading">loading election data</div>';
    try {
      await loadManifest();
      await loadMergedData();
      startAutoRefresh();
    } catch (err) {
      grid.innerHTML = `<div class="loading" style="color:var(--red)">Error: ${err.message}</div>`;
      console.error(err);
    }
  }

  init();
})();
</script>

</body>
</html>
